<!DOCTYPE html>
<html>
<head>
<title>Profile Card</title>
<style>
body{
    font-family: Arial;
    background-color: #f2f2f2;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.card{
    width: 250px;
    background-color: white;
    padding: 20px;
    text-align: center;
    border-radius: 8px;
    box-shadow: 0 0 10px gray;
}
.card img{
    width: 120px;
    height: 120px;
    border-radius: 50%;
}
.card h2{
    margin: 10px 0;
}
.desc{
    font-size: 14px;
    color: #555;
}
</style>
</head>
<body>
<div class="card">
<img src="d:\html img\pro.jpg">
<h2>prasanna ravi</h2>
<p class="desc">
Hello! I am a student learning web development. 
I enjoy creating simple websites using HTML and CSS.
</p>
</div>
</body>
</html>
